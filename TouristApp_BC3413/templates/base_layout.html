<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Hawker Hunt{% endblock %}</title>


 <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
  <rect width='100' height='100' rx='18' fill='%23D63B1F'/>
  <text x='50%' y='54%' font-size='72' text-anchor='middle' dominant-baseline='middle'>
    🍜
  </text>
</svg>">

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Mono:wght@300;400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --chili: #D63B1F;
    --soy: #1A1109;
    --cream: #F5EFE0;
    --turmeric: #E8A020;
    --pandan: #3A6B4A;
    --smoke: #8B7355;
    --bone: #EDE3CC;
    --wok: #2C1A0E;
    --surface: #FAF5EB;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background-color: var(--surface);
    color: var(--soy);
    font-family: 'Instrument Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.6;
  }

  /* ── HEADER ────────────────────────────────────────────────────── */
  header {
    background-color: var(--chili);
    color: var(--cream);
    padding: 0 2.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 72px;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 3px solid var(--wok);
  }
  .logo {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: 1.5rem;
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    gap: 0.6rem;
    text-decoration: none;
    color: var(--cream);
  }
  .logo-sub {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    font-weight: 300;
    letter-spacing: 3px;
    text-transform: uppercase;
    opacity: 0.7;
    display: block;
    margin-top: 2px;
  }

  /* Desktop nav */
  nav { display: flex; gap: 2rem; align-items: center; }
  nav a {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--cream);
    text-decoration: none;
    opacity: 0.75;
    transition: opacity 0.2s;
  }
  nav a:hover { opacity: 1; }
  nav a.active { opacity: 1; border-bottom: 1.5px solid var(--cream); padding-bottom: 2px; }

  /* Hamburger button — hidden on desktop */
  .hamburger {
    display: none;
    flex-direction: column;
    gap: 5px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px;
  }
  .hamburger span {
    display: block;
    width: 24px;
    height: 2px;
    background: var(--cream);
    border-radius: 2px;
    transition: all 0.25s;
  }

  /* Mobile nav drawer */
  .mobile-nav {
    display: none;
    flex-direction: column;
    background-color: var(--wok);
    position: fixed;
    top: 72px;
    left: 0;
    right: 0;
    z-index: 99;
    padding: 1rem 1.5rem;
    gap: 0;
    border-bottom: 2px solid var(--chili);
    animation: slideDown 0.2s ease;
  }
  @keyframes slideDown {
    from { transform: translateY(-8px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }
  .mobile-nav.open { display: flex; }
  .mobile-nav a {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--cream);
    text-decoration: none;
    padding: 0.9rem 0;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    opacity: 0.8;
  }
  .mobile-nav a:last-child { border-bottom: none; }
  .mobile-nav a.active, .mobile-nav a:hover { opacity: 1; color: var(--turmeric); }

  /* ── HERO ───────────────────────────────────────────────────────── */
  .hero {
    background-color: var(--soy);
    padding: 4rem 2.5rem 3rem;
    position: relative;
    overflow: hidden;
  }
  .hero-inner { max-width: 1200px; margin: 0 auto; }
  .hero-eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--turmeric);
    margin-bottom: 1rem;
  }
  .hero-title {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: clamp(2rem, 5vw, 4rem);
    line-height: 0.95;
    color: var(--cream);
    margin-bottom: 1rem;
  }
  .hero-title em { font-style: italic; color: var(--turmeric); }
  .hero-desc { color: var(--smoke); font-size: 0.9rem; line-height: 1.7; max-width: 500px; }
  .hero-deco {
    position: absolute; right: -60px; bottom: -60px;
    width: 320px; height: 320px; border-radius: 50%;
    background: radial-gradient(circle, rgba(216,58,31,0.12) 0%, transparent 70%);
    pointer-events: none;
  }

  /* ── MAIN LAYOUT ────────────────────────────────────────────────── */
  .main-wrapper {
    max-width: 1200px;
    margin: 0 auto;
    padding: 3rem 2.5rem;
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 2.5rem;
    align-items: start;
  }
  .sidebar { position: sticky; top: 90px; }

  /* ── PANEL ──────────────────────────────────────────────────────── */
  .panel {
    background-color: var(--cream);
    border: 2px solid var(--bone);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 1.5rem;
  }
  .panel-header {
    background-color: var(--soy);
    color: var(--cream);
    padding: 1rem 1.25rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .panel-title {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .panel-body { padding: 1.25rem; }

  /* ── CHIPS ──────────────────────────────────────────────────────── */
  .chips-grid { display: flex; flex-wrap: wrap; gap: 0.5rem; }
  .chip {
    border: 1.5px solid var(--bone);
    background: white;
    padding: 0.35rem 0.8rem;
    border-radius: 100px;
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--smoke);
    font-weight: 500;
    user-select: none;
  }
  .chip:hover { border-color: var(--chili); color: var(--chili); }
  .chip.active { background-color: var(--chili); border-color: var(--chili); color: white; }

  /* ── BUTTONS ────────────────────────────────────────────────────── */
  .apply-btn {
    width: 100%;
    background-color: var(--soy);
    color: var(--cream);
    border: none;
    padding: 1rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s;
    margin-top: 0.5rem;
    display: block;
  }
  .apply-btn:hover { background-color: var(--chili); }
  .clear-btn {
    width: 100%;
    background: transparent;
    color: var(--smoke);
    border: 1.5px solid var(--bone);
    padding: 0.75rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 0.5rem;
    display: block;
  }
  .clear-btn:hover { border-color: var(--chili); color: var(--chili); }

  /* ── SECTION HEADER ─────────────────────────────────────────────── */
  .section-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 1.5rem;
    padding-bottom: 0.75rem;
    border-bottom: 2px solid var(--soy);
    flex-wrap: wrap;
    gap: 0.5rem;
  }
  .section-title { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 700; }
  .section-count {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 2px;
    color: var(--smoke);
    text-transform: uppercase;
  }

  /* ── SORT BAR ────────────────────────────────────────────────────── */
  .sort-bar { display: flex; gap: 0.5rem; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .sort-btn {
    background: white;
    border: 1.5px solid var(--bone);
    padding: 0.35rem 0.9rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    color: var(--smoke);
    border-radius: 1px;
    transition: all 0.15s;
    text-decoration: none;
  }
  .sort-btn:hover { border-color: var(--soy); color: var(--soy); }
  .sort-btn.active { background: var(--soy); color: var(--cream); border-color: var(--soy); }

  /* ── STALL CARDS ─────────────────────────────────────────────────── */
  .stalls-list { display: flex; flex-direction: column; }
  .stall-card {
    background: white;
    border: 2px solid var(--bone);
    border-bottom: none;
    display: grid;
    grid-template-columns: 60px 1fr auto;
    align-items: stretch;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.15s;
    position: relative;
    animation: slideIn 0.4s ease both;
  }
  .stall-card:last-child { border-bottom: 2px solid var(--bone); }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .stall-card:hover { border-color: var(--chili); z-index: 2; transform: translateX(4px); }
  .stall-rank {
    background-color: var(--soy);
    color: var(--cream);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    font-weight: 700;
    min-width: 60px;
  }
  .stall-rank.top { background-color: var(--chili); }
  .stall-body { padding: 1.25rem 1.5rem; min-width: 0; }
  .stall-cuisine-badge {
    display: inline-block;
    background-color: var(--bone);
    color: var(--smoke);
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 0.2rem 0.5rem;
    border-radius: 1px;
    margin-bottom: 0.5rem;
  }
  .stall-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: 0.25rem;
    word-break: break-word;
  }
  .stall-location { font-size: 0.78rem; color: var(--smoke); }
  .stall-meta {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    padding: 1.25rem 1.5rem;
    gap: 0.4rem;
    border-left: 1px solid var(--bone);
    min-width: 110px;
  }
  .rating-val { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 700; line-height: 1; }
  .stars { display: flex; gap: 2px; font-size: 0.7rem; }
  .star { color: var(--turmeric); }
  .star-empty { color: var(--bone); }
  .reviews-count { font-family: 'DM Mono', monospace; font-size: 0.6rem; color: var(--smoke); letter-spacing: 1px; }
  .dist-badge {
    background-color: var(--pandan);
    color: white;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 1px;
    padding: 0.25rem 0.6rem;
    border-radius: 100px;
  }
  .menu-title {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--smoke);
    margin-bottom: 1rem;
  }
  .menu-note { color: var(--smoke); font-size: 0.82rem; font-style: italic; }
  .empty-state { text-align: center; padding: 4rem 2rem; color: var(--smoke); }
  .empty-state h3 { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--soy); margin-bottom: 0.5rem; }
  .empty-state p { font-size: 0.85rem; line-height: 1.6; }

  /* ── TOAST ───────────────────────────────────────────────────────── */
  .toast {
    position: fixed;
    bottom: 2rem; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background-color: var(--soy); color: var(--cream);
    padding: 0.75rem 1.5rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    border-left: 4px solid var(--turmeric);
    z-index: 999;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  .toast.visible { transform: translateX(-50%) translateY(0); }

  /* ── FOOTER ──────────────────────────────────────────────────────── */
  footer {
    background-color: var(--soy); color: var(--smoke);
    text-align: center; padding: 2rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; margin-top: 4rem;
  }
  footer span { color: var(--chili); }

  /* ── RESPONSIVE: TABLET (≤1024px) ──────────────────────────────── */
  @media (max-width: 1024px) {
    .main-wrapper {
      grid-template-columns: 240px 1fr;
      gap: 1.5rem;
      padding: 2rem 1.5rem;
    }
  }

  /* ── RESPONSIVE: MOBILE (≤768px) ───────────────────────────────── */
  @media (max-width: 768px) {
    /* Header */
    header { padding: 0 1rem; }
    nav { display: none; }
    .hamburger { display: flex; }

    /* Hero */
    .hero { padding: 2.5rem 1rem 2rem; }
    .hero-title { font-size: clamp(1.8rem, 7vw, 2.5rem); }
    .hero-desc { font-size: 0.85rem; }

    /* Layout: stack sidebar above content */
    .main-wrapper {
      grid-template-columns: 1fr;
      padding: 1.25rem 1rem;
      gap: 1.25rem;
    }
    .sidebar {
      position: static;
      /* Collapse sidebar into an accordion on mobile */
    }

    /* Stall card: shrink meta column on small screens */
    .stall-card { grid-template-columns: 48px 1fr auto; }
    .stall-rank { font-size: 1.1rem; min-width: 48px; }
    .stall-meta { min-width: 80px; padding: 0.75rem 0.75rem; }
    .stall-body { padding: 0.9rem 1rem; }
    .stall-name { font-size: 0.95rem; }
  }

  /* ──- RESPONSIVE: SMALL MOBILE (≤480px) ─────────────────────────── */
  @media (max-width: 480px) {
    .stall-meta { display: none; }
    .stall-body { grid-column: 2 / -1; }
    .stall-card { grid-template-columns: 48px 1fr; }
    .section-title { font-size: 1.4rem; }
    .sort-bar { gap: 0.3rem; }
    .sort-btn { font-size: 0.55rem; padding: 0.3rem 0.6rem; }

    /* Chips wrap nicely */
    .chip { font-size: 0.7rem; padding: 0.3rem 0.65rem; }
  }
</style>
</head>
<body>

  <header>
    <a href="/" class="logo">
      <span>🍜</span>
      <div>Hawker Hunt<span class="logo-sub">Singapore Food Discovery</span></div>
    </a>
    <nav>
      <a href="/dashboard" class="{{ 'active' if active_page == 'dashboard' }}">Dashboard</a>
      <a href="/cuisines" class="{{ 'active' if active_page == 'cuisines' }}">Cuisines</a>
      <a href="/itinerary" class="{{ 'active' if active_page == 'itinerary' }}">Itinerary</a>
      <a href="/location" class="{{ 'active' if active_page == 'location' }}">Location</a>
      <a href="/reviews"  class="{{ 'active' if active_page == 'reviews' }}">Reviews</a>
      <a href="/preferences" class="{{ 'active' if active_page == 'preferences' }}">Preferences</a>
    </nav>
    <!-- Hamburger for mobile -->
    <button class="hamburger" id="hamburger" aria-label="Open menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </header>

  <!-- Mobile nav drawer -->
  <div class="mobile-nav" id="mobile-nav" role="navigation" aria-label="Mobile navigation">
    <a href="/dashboard" class="{{ 'active' if active_page == 'dashboard' }}">Dashboard</a>
    <a href="/cuisines" class="{{ 'active' if active_page == 'cuisines' }}">Cuisines</a>
    <a href="/itinerary" class="{{ 'active' if active_page == 'itinerary' }}">Itinerary</a>
    <a href="/location" class="{{ 'active' if active_page == 'location' }}">Location</a>
    <a href="/reviews"  class="{{ 'active' if active_page == 'reviews' }}">Reviews</a>
    <a href="/preferences" class="{{ 'active' if active_page == 'preferences' }}">Preferences</a>
  </div>

  {% block content %}{% endblock %}

  <footer>Built with <span>♥</span> for Singapore Hawker Culture — BC3413 Tourist App</footer>
  <div class="toast" id="toast"></div>

  <!-- Hamburger toggle script -->
  <script>
  (function () {
    const btn = document.getElementById('hamburger');
    const nav = document.getElementById('mobile-nav');
    if (!btn || !nav) return;
    btn.addEventListener('click', function () {
      const open = nav.classList.toggle('open');
      btn.setAttribute('aria-expanded', open);
      // Animate hamburger → X
      const spans = btn.querySelectorAll('span');
      if (open) {
        spans[0].style.transform = 'rotate(45deg) translate(5px, 5px)';
        spans[1].style.opacity   = '0';
        spans[2].style.transform = 'rotate(-45deg) translate(5px, -5px)';
      } else {
        spans[0].style.transform = '';
        spans[1].style.opacity   = '';
        spans[2].style.transform = '';
      }
    });
    // Close when a link is tapped
    nav.querySelectorAll('a').forEach(a => a.addEventListener('click', () => {
      nav.classList.remove('open');
      btn.setAttribute('aria-expanded', false);
    }));
  })();
  </script>
</body>
</html>
